[input]
xyz = "water.xyz"

[cell]
a = 20.0
b = 20.0
c = 20.0

[dynamics]
timestep_fs = 0.25
steps = 10

[force_provider]
type = "xtb"
# Optional: set this to the full xtb executable path on Windows.
# command = "C:/xTB/xtb-6.7.1/bin/xtb.exe"
method = "GFN2-xTB"
charge = 0
multiplicity = 1
accuracy = 1.0
electronic_temperature = 300.0
max_iterations = 250
omp_num_threads = 1
solvent = "none"

[output]
trajectory = "xtb_water_traj.xyz"
log = "xtb_water_md.log"
log_interval = 1

[restart]
path = "RESTART"
interval = 5
resume_from_RESTART = false
resume_from_GEOMETRY = false
