[input]
xyz = "ethene.xyz"

[cell]
a = 20.0
b = 20.0
c = 20.0

[dynamics]
timestep_fs = 0.25
steps = 10

[force_provider]
type = "uff"
cutoff_angstrom = 10.0
atom_types = ["C_2", "C_2", "H_", "H_", "H_", "H_"]
nonbonded_exclusions = "exclude_12_13"
lj_14_scale = 1.0
electrostatic_14_scale = 1.0
lj_cutoff_mode = "plain"
use_neighbor_list = true
neighbor_skin_angstrom = 2.0

bonds = [
  { atoms = [0, 1], order = 2.0 },
  { atoms = [0, 2], order = 1.0 },
  { atoms = [0, 3], order = 1.0 },
  { atoms = [1, 4], order = 1.0 },
  { atoms = [1, 5], order = 1.0 },
]

angles = [
  { atoms = [1, 0, 2] },
  { atoms = [1, 0, 3] },
  { atoms = [2, 0, 3] },
  { atoms = [0, 1, 4] },
  { atoms = [0, 1, 5] },
  { atoms = [4, 1, 5] },
]

torsions = [
  { atoms = [2, 0, 1, 4] },
  { atoms = [2, 0, 1, 5] },
  { atoms = [3, 0, 1, 4] },
  { atoms = [3, 0, 1, 5] },
]

inversions = [
  { atoms = [0, 1, 2, 3] },
  { atoms = [1, 0, 4, 5] },
]

[output]
trajectory = "uff_ethene_explicit_topology_traj.xyz"
log = "uff_ethene_explicit_topology_md.log"
log_interval = 1
